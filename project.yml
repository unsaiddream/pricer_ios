name: MinPrice
options:
  bundleIdPrefix: kz.minprice
  deploymentTarget:
    iOS: "16.0"
  xcodeVersion: "15"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    IPHONEOS_DEPLOYMENT_TARGET: "16.0"
    PRODUCT_BUNDLE_IDENTIFIER: kz.minprice.app
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: 1

targets:
  MinPrice:
    type: application
    platform: iOS
    sources:
      - MinPrice
    resources:
      - MinPrice/Resources/Fonts
    settings:
      base:
        INFOPLIST_FILE: MinPrice/Resources/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
    dependencies:
      - package: Kingfisher
    scheme:
      testTargets:
        - MinPriceTests

  MinPriceTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - MinPriceTests
    dependencies:
      - target: MinPrice

packages:
  Kingfisher:
    url: https://github.com/onevcat/Kingfisher
    from: 7.0.0
